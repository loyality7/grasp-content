<svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
  <!-- Addition circle -->
  <circle cx="50" cy="50" r="25" fill="#E8593C" opacity="0.9"/>
  <text x="50" y="58" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">+</text>
  
  <!-- Multiplication circle -->
  <circle cx="150" cy="50" r="25" fill="#CECBF6" opacity="0.9"/>
  <text x="150" y="58" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#26215C" text-anchor="middle">×</text>
  
  <!-- Subtraction circle -->
  <circle cx="50" cy="110" r="25" fill="#F5B8DB" opacity="0.9"/>
  <text x="50" y="118" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#57203E" text-anchor="middle">−</text>
  
  <!-- Division circle -->
  <circle cx="150" cy="110" r="25" fill="#F5D867" opacity="0.9"/>
  <text x="150" y="118" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#52430A" text-anchor="middle">÷</text>
  
  <!-- Connecting lines -->
  <path d="M 75 50 L 125 50" stroke="#E8593C" stroke-width="2" stroke-dasharray="5,3" opacity="0.4"/>
  <path d="M 50 75 L 50 85" stroke="#F5B8DB" stroke-width="2" stroke-dasharray="5,3" opacity="0.4"/>
  <path d="M 150 75 L 150 85" stroke="#F5D867" stroke-width="2" stroke-dasharray="5,3" opacity="0.4"/>
  <path d="M 75 110 L 125 110" stroke="#CECBF6" stroke-width="2" stroke-dasharray="5,3" opacity="0.4"/>
  
  <!-- Equations -->
  <text x="100" y="30" font-family="Arial,sans-serif" font-size="14" fill="#1A1A1A" text-anchor="middle" font-weight="500">1 + 2 = 3</text>
  <text x="100" y="145" font-family="Arial,sans-serif" font-size="14" fill="#1A1A1A" text-anchor="middle" font-weight="500">4 × 5 = 20</text>
  
  <!-- Decorative dots -->
  <circle cx="180" cy="25" r="3" fill="#E8593C" opacity="0.3"/>
  <circle cx="20" cy="140" r="3" fill="#1D9E75" opacity="0.3"/>
  <circle cx="170" cy="135" r="3" fill="#F5D867" opacity="0.3"/>
  <circle cx="30" cy="25" r="3" fill="#CECBF6" opacity="0.3"/>
</svg>
