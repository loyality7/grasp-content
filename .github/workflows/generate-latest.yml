name: Generate Latest Manifests

on:
  push:
    branches: [ main ]
    paths:
      - 'content/courses/**'
      - 'content/domains/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-latest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Update Latest Manifests
        run: node scripts/generate-latest.js

      - name: Update Compiled Manifests
        run: node scripts/compile-manifests.js

      - name: Commit Latest Manifests
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/courses/**/latest.json
          git add content/domains.json
          git add content/courses/**/courses.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-sync course latest.json and domains manifests [skip ci]"
            git pull --rebase origin main
            git push
          fi
